[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "jsdeob"
version = "0.1.0"
description = "Pure Python JavaScript deobfuscator"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.9"
dependencies = ["pyjsparser>=2.7.1"]

[project.scripts]
jsdeob = "jsdeob.__main__:main"
